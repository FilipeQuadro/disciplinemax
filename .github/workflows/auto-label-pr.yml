name: Auto-label and request reviewers

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  auto_label_and_review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Add labels and request reviewers
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;
            const title = pr.title || '';
            const body = pr.body || '';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labelsToAdd = [];

            // Heurísticas para etiquetas
            if (/chore\(scripts\)/i.test(title) || /seed|e2e|ci|scripts/i.test(title + '\n' + body)) {
              labelsToAdd.push('chore', 'ci', 'docs');
            }

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: pr.number, labels: Array.from(new Set(labelsToAdd)) });
            }

            // Tenta ler lista de reviewers em .github/auto_reviewers.txt (um por linha)
            try {
              const res = await github.rest.repos.getContent({ owner, repo, path: '.github/auto_reviewers.txt' });
              const content = Buffer.from(res.data.content, res.data.encoding).toString();
              let reviewers = content.split(/\r?\n/).map(s => s.trim()).filter(Boolean);

              // Remove o autor do PR da lista de reviewers (não faz sentido solicitar revisão ao próprio autor)
              const prAuthor = pr.user && pr.user.login;
              reviewers = reviewers.filter(r => r && r !== prAuthor);

              if (reviewers.length > 0) {
                // Separa reviewers em colaboradores e não-colaboradores
                const collaborators = [];
                const nonCollaborators = [];
                for (const r of reviewers) {
                  try {
                    await github.rest.repos.checkCollaborator({ owner, repo, username: r });
                    collaborators.push(r);
                  } catch (err) {
                    nonCollaborators.push(r);
                  }
                }

                // Solicita review apenas dos colaboradores
                if (collaborators.length > 0) {
                  try {
                    await github.rest.pulls.requestReviewers({ owner, repo, pull_number: pr.number, reviewers: collaborators });
                  } catch (err) {
                    // se falhar, registra um comentário com menção a todos
                    const mentions = reviewers.map(x => `@${x}`).join(' ');
                    const prUrl = pr.html_url || `https://github.com/${owner}/${repo}/pull/${pr.number}`;
                    await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body: `Olá ${mentions}, por favor revise este PR: ${prUrl}` });
                  }
                }

                // Para não-colaboradores, apenas publica um comentário (ping)
                if (nonCollaborators.length > 0) {
                  const mentions = nonCollaborators.map(r => `@${r}`).join(' ');
                  const prUrl = pr.html_url || `https://github.com/${owner}/${repo}/pull/${pr.number}`;
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: pr.number,
                    body: `Olá ${mentions}, por favor revise este PR: ${prUrl}\n\nObs: vocês não são colaboradores do repositório; caso queiram ser solicitados automaticamente, aceitem o convite ou peçam para ser adicionados.`
                  });
                }
              } else {
                // Se não houver revisores válidos, adiciona um comentário orientando como proceder
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: 'Nenhum revisor válido encontrado em .github/auto_reviewers.txt. Por favor adicione um revisor ou convide alguém para o repositório.'
                });
              }
            } catch (e) {
              // arquivo não existe ou erro -> ignora
            }
