name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install pnpm
        run: npm i -g pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Start API and Web (background)
        run: |
          pnpm --filter api dev &
          pnpm --filter web dev &
          # Give services more time to boot before running E2E
          sleep 15
      - name: Run E2E check
        run: node scripts/e2e_check.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # add other secrets if necessary
